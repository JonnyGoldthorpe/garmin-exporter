name: Daily Health Export

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test Renpho login
        env:
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
        run: |
          python - <<'EOF'
          import hashlib, requests, os

          email = os.environ["RENPHO_EMAIL"]
          password = os.environ["RENPHO_PASSWORD"]
          hashed = hashlib.md5(password.encode()).hexdigest()

          resp = requests.post(
              "https://renpho.qnclouds.com/api/v3/users/sign_in.json?app_id=Renpho",
              data={"secure_flag": 1, "email": email, "password": hashed}
          )
          print("Status:", resp.status_code)
          print("Response:", resp.text[:500])
          EOF

      - name: Run exporter
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python garmin_to_excel.py
