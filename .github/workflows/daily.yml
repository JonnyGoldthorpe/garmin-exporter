name: Weekly Health Export
on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Write Garmin tokens
        run: |
          mkdir -p ~/.garth
          echo '${{ secrets.GARMIN_OAUTH1_TOKEN }}' > ~/.garth/oauth1_token.json
          echo '${{ secrets.GARMIN_OAUTH2_TOKEN }}' > ~/.garth/oauth2_token.json
      - name: Cache Garmin tokens
        uses: actions/cache@v4
        with:
          path: ~/.garth
          key: garmin-tokens
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run exporter
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secr
