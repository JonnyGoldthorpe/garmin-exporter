name: Daily Health Export
on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Write Garmin tokens
        env:
          OAUTH1: ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          OAUTH2: ${{ secrets.GARMIN_OAUTH2_TOKEN }}
        run: |
          mkdir -p ~/.garth
          echo "$OAUTH1" > ~/.garth/oauth1_token.json
          echo "$OAUTH2" > ~/.garth/oauth2_token.json
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run exporter
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python garmin_to_excel.py
