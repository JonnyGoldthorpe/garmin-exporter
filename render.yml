name: Daily Health Export
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Write Garmin tokens
        env:
          OAUTH1: ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          OAUTH2: ${{ secrets.GARMIN_OAUTH2_TOKEN }}
        run: |
          mkdir -p ~/.garth
          echo "$OAUTH1" > ~/.garth/oauth1_token.json
          echo "$OAUTH2" > ~/.garth/oauth2_token.json
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run exporter
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          RENPHO_EMAIL: ${{ secrets.RENPHO_EMAIL }}
          RENPHO_PASSWORD: ${{ secrets.RENPHO_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python garmin_to_excel.py
      - name: Update Garmin token secrets
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          OAUTH1=$(cat ~/.garth/oauth1_token.json)
          OAUTH2=$(cat ~/.garth/oauth2_token.json)
          
          PUB_KEY=$(curl -s -H "Authorization: token $GH_PAT" \
            https://api.github.com/repos/JonnyGoldthorpe/garmin-exporter/actions/secrets/public-key)
          KEY_ID=$(echo "$PUB_KEY" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          KEY=$(echo "$PUB_KEY" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")
          
          encrypt_and_update() {
            SECRET_NAME=$1
            SECRET_VALUE=$2
            ENCRYPTED=$(python3 -c "
          from base64 import b64encode
          from nacl import encoding, public
          import sys
          key = public.PublicKey('$KEY'.encode(), encoding.Base64Encoder())
          box = public.SealedBox(key)
          encrypted = box.encrypt('$SECRET_VALUE'.encode())
          print(b64encode(encrypted).decode())
          ")
            curl -s -X PUT -H "Authorization: token $GH_PAT" \
              -H "Content-Type: application/json" \
              -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$KEY_ID\"}" \
              https://api.github.com/repos/JonnyGoldthorpe/garmin-exporter/actions/secrets/$SECRET_NAME
          }
          
          encrypt_and_update GARMIN_OAUTH1_TOKEN "$OAUTH1"
          encrypt_and_update GARMIN_OAUTH2_TOKEN "$OAUTH2"
```

You'll also need to add `pynacl` to your `requirements.txt`:
```
garminconnect
openpyxl
pynacl
